<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Admin - Doces da Clara</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family: 'Quicksand', sans-serif; }</style>
</head>
<body class="bg-gray-50 min-h-screen text-gray-800">

    <header class="bg-white shadow-sm py-6 border-b-4 border-pink-400 mb-10">
        <div class="container mx-auto px-4 flex justify-between items-center">
            <h1 class="text-3xl font-bold text-pink-600">⚙️ Painel de Controle</h1>
            <a href="{{ url_for('index') }}" class="text-gray-500 hover:text-pink-500 font-semibold">Ver Loja ➔</a>
        </div>
    </header>

    <main class="container mx-auto px-4 max-w-5xl">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">

            <div class="md:col-span-1 bg-white p-6 rounded-3xl shadow-sm border border-gray-100 h-fit">
                <h2 class="text-xl font-bold mb-4 text-gray-700">Adicionar Novo Doce</h2>
                <form action="{{ url_for('admin_adicionar') }}" method="POST" class="space-y-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Nome do Produto</label>
                        <input type="text" name="nome" required class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-300 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Preço (R$)</label>
                        <input type="text" name="preco" required placeholder="Ex: 15.50" class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-300 outline-none">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-600 mb-1">Link da Foto</label>
                        <input type="url" name="imagem" required placeholder="https://..." class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-pink-300 outline-none">
                    </div>
                    <button type="submit" class="w-full bg-pink-500 hover:bg-pink-600 text-white font-bold py-3 px-4 rounded-xl transition-colors">
                        Salvar Produto
                    </button>
                </form>
            </div>

            <div class="md:col-span-2 bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
                <h2 class="text-xl font-bold mb-4 text-gray-700">Produtos no Cardápio</h2>

                <div class="overflow-x-auto">
                    <table class="w-full text-left border-collapse">
                        <thead>
                            <tr class="bg-gray-50 text-gray-600 text-sm border-b">
                                <th class="p-3 rounded-tl-xl">Foto</th>
                                <th class="p-3">Nome</th>
                                <th class="p-3">Preço</th>
                                <th class="p-3 rounded-tr-xl text-center">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            {% for produto in produtos %}
                            <tr class="border-b hover:bg-gray-50 transition-colors">
                                <td class="p-3">
                                    <img src="{{ produto.imagem }}" alt="Foto" class="w-12 h-12 rounded-lg object-cover">
                                </td>
                                <td class="p-3 font-semibold text-gray-700">{{ produto.nome }}</td>
                                <td class="p-3 text-pink-600 font-bold">R$ {{ "%.2f"|format(produto.preco) }}</td>
                                <td class="p-3 text-center">
                                    <a href="{{ url_for('admin_excluir', produto_id=produto.id) }}"
                                       onclick="return confirm('Tem certeza que deseja excluir {{ produto.nome }}?')"
                                       class="text-red-500 hover:bg-red-50 px-3 py-1 rounded-lg text-sm font-bold transition-colors">
                                        Excluir
                                    </a>
                                </td>
                            </tr>
                            {% else %}
                            <tr>
                                <td colspan="4" class="p-6 text-center text-gray-400 font-semibold">Nenhum produto cadastrado.</td>
                            </tr>
                            {% endfor %}
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </main>
</body>
</html>
